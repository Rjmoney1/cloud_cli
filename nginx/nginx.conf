events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Set real IP from proxy if needed
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;

    server {
        listen 80;
        server_name _;

        # Max body size for ISO uploads
        client_max_body_size 4G;

        # Security Headers (Defense-in-depth)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

        # Redirect /workspace/username to /workspace/username/
        location ~ ^/workspace/(?<username>[^/]+)$ {
            return 302 /workspace/$username/;
        }

        # User Workspace VS Code IDE
        location ~ ^/workspace/(?<username>[^/]+)(?<ndpath>/.*)$ {
            resolver 127.0.0.11 valid=30s;
            
            # Authenticate user session ownership of this workspace
            set $ws_user $username;
            auth_request /auth-verify;
            
            rewrite ^/workspace/[^/]+(/.*)$ $1 break;
            proxy_pass http://lab-$username:8080;

            # WebSocket support for editor & integrated terminal
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for shell connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Redirect /n8n/username to /n8n/username/
        location ~ ^/n8n/(?<username>[^/]+)$ {
            return 302 /n8n/$username/;
        }

        # User Workspace n8n
        location ~ ^/n8n/(?<username>[^/]+)(?<ndpath>/.*)$ {
            resolver 127.0.0.11 valid=30s;
            
            # Authenticate user session ownership of this workspace
            set $ws_user $username;
            auth_request /auth-verify;
            
            # Rewrite to strip subpath before forwarding to n8n
            rewrite ^/n8n/[^/]+(/.*)$ $1 break;
            proxy_pass http://lab-$username:5678;

            # WebSocket & SSE support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Internal authentication verify location
        location = /auth-verify {
            internal;
            resolver 127.0.0.11 valid=30s;
            proxy_pass http://lab-web-app:80/api/auth-verify.php?workspace=$ws_user;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Main platform PHP pages and APIs
        location / {
            proxy_pass http://lab-web-app:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for Server-Sent Events (SSE) live updates
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 600s;
        }
    }
}
