version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: lab-mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-linux_lab}
      MYSQL_USER: ${DB_USER:-lab_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lab_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - linux-lab-net

  web-app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lab-web-app
    restart: always
    volumes:
      - ./web:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/linux-lab/isos:/var/www/html/uploads/isos
    environment:
      - DB_HOST=mysql-db
      - DB_NAME=${DB_NAME:-linux_lab}
      - DB_USER=${DB_USER:-lab_user}
      - DB_PASS=${DB_PASSWORD:-lab_password}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      - mysql-db
    networks:
      - linux-lab-net

  nginx-proxy:
    image: nginx:alpine
    container_name: lab-nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app
    networks:
      - linux-lab-net

volumes:
  db-data:

networks:
  linux-lab-net:
    name: linux-lab-net
